<!--
nuxeo-home-tasks (license Apache, see nuxeo-home-page-layout.html)

Centralize task-related widgets for the nuxeo-home dashboard. This comes almost directly from nuxeo-home original code,
modified to handle visibility, title, avoid useless refresh, etc.
-->
<link rel="import" href="../nuxeo-home-config/nuxeo-home-config-behavior.html">
<link rel="import" href="nuxeo-home-style.html">
<dom-module id="nuxeo-home-tasks">
  <template>
    <style include="nuxeo-styles nuxeo-home-style">

      .task-box {
        line-height: 155%;
      }

      .task-box + .task-box {
        border-top: 1px solid var(--divider-color);
      }

      .task-due-date {
        opacity: 0.5;
        margin-right: 0.5rem;
      }

      .taskDoc .doc-title,
      .date {
        text-overflow: ellipsis;
        white-space: nowrap;
        max-width: 85%;
        overflow: hidden;
      }

      .date {
        color: var(--nuxeo-warn-text);
      }

      .task-box {
        line-height: 155%;
      }

      .task-box + .task-box {
        border-top: 1px solid var(--divider-color);
      }

      .task-due-date {
        opacity: 0.5;
        margin-right: 0.5rem;
      }

      .taskDoc .taskdoc-title,
      .date {
        text-overflow: ellipsis;
        white-space: nowrap;
        max-width: 85%;
        overflow: hidden;
      }

      .date {
        color: var(--nuxeo-warn-text);
      }

      .list-item {
        cursor: pointer;
        padding: 1em;
        border-bottom: 1px solid var(--nuxeo-border);
      }

      .list-item:hover {
        @apply --nuxeo-block-hover;
      }

      .list-item:focus {
        outline: 0;
      }

      .task-name {
        font-weight: bold;
        margin-left: 10px;
      }

      .horizontal {
        @apply --layout-horizontal;
        @apply --layout-center;
      }

    </style>

    <nuxeo-connection id="nx"></nuxeo-connection>

    <nuxeo-card icon="nuxeo:tasks" heading="[[i18n(title)]]">
      <nuxeo-task-page-provider id="tasksProvider" page-size="20"></nuxeo-task-page-provider>
      <nuxeo-data-list
        nx-provider="tasksProvider"
        id="tasksList"
        wrapper-height="350px"
        as="task"
        max-items="15"
        empty-label="[[i18n('tasksList.noTasks')]]"
        select-on-tap
        selection-enabled
        selected-item="{{_selection}}"
      >
        <template>
          <div tabindex$="{{tabIndex}}" class="list-item">
            <div class="task-box">
              <div class="horizontal layout center">
                <span>[[i18n(task.workflowModelName)]]:</span>
                <span class="task-name">[[i18n(task.name)]]</span>
              </div>
              <div class="taskDoc horizontal">
                <span class="doc-title">Document : [[task.targetDocumentIds.0.title]]</span>
              </div>
              <div class="horizontal">
                <span class="task-due-date">[[i18n('tasksList.dueDate')]]</span>
                <span class="date">
                  <nuxeo-date datetime="[[task.dueDate]]" format="relative"></nuxeo-date>
                </span>
              </div>
            </div>
          </div>
        </template>
      </nuxeo-data-list>
    </nuxeo-card>
    
  </template>

  <script>
    Polymer({
      is: 'nuxeo-home-tasks',
      behaviors: [Nuxeo.RoutingBehavior, Nuxeo.NuxeoHomeConfigBehavior],
      properties: {
        title: String,
        visible: {
          type: Boolean,
          observer: '_visibleChanged',
        }
      },

      observers: ['_processTask(_selection)'],

      _processTask() {
        if (this._selection) {
          this.fire('navigate', {
            task: this._selection,
            index: this.$.tasksList._selectedItemIndex(),
            params: { offset: this.$.tasksProvider.offset, pageSize: this.$.tasksProvider.pageSize },
          });
        }
      },

      ready: function() {
        this._refresh();
      },
      
      _visibleChanged(visible) {
        if (visible) {
          this._refresh();
        }
      },

      _refresh() {
        if(!this.isDisplayed(this.is)) {
          return;
        }
        this.$.nx.connect().then((user) => {
          this.$.tasksProvider.params = {
            userId: user.id,
          };
          this.$.tasksList.fetch();
        });
      },

      _navigate(e) {
        let detail;
        if (e.detail.item) {
          detail = {
            doc: e.detail.item,
          };
          this.navigateTo(detail.doc);
        } else {
          detail = {
            doc: e.model.item,
          };
        }
        this.fire('navigate', detail);
      }
    });
  </script>
</dom-module>
