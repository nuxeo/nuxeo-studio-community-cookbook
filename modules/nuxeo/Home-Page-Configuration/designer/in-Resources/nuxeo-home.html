<!--
Overring the default `nuxeo-home` element
@group Nuxeo UI
@element nuxeo-home

It is very important to propagate the visible attribute to the widgets,
otherwise they won't be able to refresh their content when they become visible.

As a possible reminder, this visible property is set by Nuxeo WebUI, which is using
an iron-page element that handles automatically this property.
-->
<link rel="import" href="nuxeo-home/nuxeo-home-page-layout.html">
<dom-module id="nuxeo-home">
  <template>
    <style include="nuxeo-styles">
    </style>

    <nuxeo-connection id="nx"></nuxeo-connection>
    <nuxeo-home-page-layout id="homePage" visible="[[visible]]"></nuxeo-home-page-layout>
  </template>

  <script>
    Polymer({
      is: 'nuxeo-home',
      behaviors: [Nuxeo.RoutingBehavior, Nuxeo.FormatBehavior],
      properties: {
        visible: Boolean
      }
    });
  </script>
</dom-module>
