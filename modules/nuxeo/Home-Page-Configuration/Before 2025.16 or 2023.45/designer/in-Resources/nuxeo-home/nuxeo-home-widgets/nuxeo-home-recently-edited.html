<!--
nuxeo-home-recently-edited (license Apache, see nuxeo-home-page-layout.html)

Displays the documents recently edited. This comes almost directly from nuxeo-home original code,
modified to handle visibility, title, avoid useless refresh, etc.
-->
<link rel="import" href="../nuxeo-home-config/nuxeo-home-config-behavior.html">
<link rel="import" href="nuxeo-home-style.html">
<dom-module id="nuxeo-home-recently-edited">
  <template>
    <style include="nuxeo-styles nuxeo-home-style">
    </style>

    <nuxeo-card icon="nuxeo:edit" heading="[[i18n(title)]]">
      <nuxeo-page-provider
        id="latestQuery"
        page-size="20"
        provider="domain_documents"
        schemas="dublincore,common,uid"
        enrichers="thumbnail"
        params='{"queryParams": "/"}'
        headers='{"fetch-document": "properties"}'
      >
      </nuxeo-page-provider>
      <nuxeo-data-table
        id="latestEditedDocs"
        wrapper-height="350px"
        max-items="15"
        nx-provider="latestQuery"
        empty-label="[[i18n('queryWidget.noDocuments')]]"
        on-row-clicked="_navigate"
        caption-text="[[i18n('table.caption.recentlyEditedDocs')]]"
      >
        <nuxeo-data-table-column name="[[i18n('documentContentView.datatable.header.title')]]" flex="100">
          <template>
            <nuxeo-document-thumbnail document="[[item]]"></nuxeo-document-thumbnail>
            <a class="ellipsis" href$="[[urlFor(item)]]">[[item.title]]</a>
          </template>
        </nuxeo-data-table-column>
        <nuxeo-data-table-column name="[[i18n('documentContentView.datatable.header.modified')]]" flex="50">
          <template>
            <nuxeo-date datetime="[[item.properties.dc:modified]]" format="relative"></nuxeo-date>
          </template>
        </nuxeo-data-table-column>
        <nuxeo-data-table-column
          name="[[i18n('documentContentView.datatable.header.lastContributor')]]"
          flex="50"
        >
          <template>
            <nuxeo-user-tag user="[[item.properties.dc:lastContributor]]"></nuxeo-user-tag>
          </template>
        </nuxeo-data-table-column>
      </nuxeo-data-table>
    </nuxeo-card>
    
  </template>

  <script>
    Polymer({
      is: 'nuxeo-home-recently-edited',
      behaviors: [Nuxeo.RoutingBehavior, Nuxeo.NuxeoHomeConfigBehavior],
      properties: {
        title: String,
        visible: {
          type: Boolean,
          observer: '_visibleChanged',
        }
      },

      ready: function() {
        this._refresh();
      },
      
      _visibleChanged(visible) {
        if (visible) {
          this._refresh();
        }
      },

      _refresh() {
        if(!this.isDisplayed(this.is)) {
          return;
        }
        this.$.latestEditedDocs.fetch();
      },

      _navigate(e) {
        let detail;
        if (e.detail.item) {
          detail = {
            doc: e.detail.item,
          };
          this.navigateTo(detail.doc);
        } else {
          detail = {
            doc: e.model.item,
          };
        }
        this.fire('navigate', detail);
      }
    });
  </script>
</dom-module>
